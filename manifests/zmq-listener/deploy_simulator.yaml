apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim
  labels:
    app: sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim
  template:
    metadata:
      labels:
        app: sim
    spec:
      initContainers:
      # UDS Tokenizer sidecar - handles tokenization via gRPC over Unix Domain Socket
      # restartPolicy: Always makes this a native sidecar (K8s 1.29+):
      # sim will not start until this container's readinessProbe passes
      - name: uds-tokenizer
        image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        env:
        - name: LOG_LEVEL
          value: "DEBUG"
        - name: PROBE_PORT
          value: "8082"
        ports:
        - name: health
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      containers:
        - name: sim
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          args:
            - "--port=8000"
            - "--model=Qwen/Qwen3-0.6B"
            - "--enable-kvcache=true"
            - "--block-size=8"
            - "--zmq-endpoint=tcp://zmq-listener-service:5557"
            - "--event-batch-size=1"
          env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
          ports:
          - name: http
            containerPort: 8200
            protocol: TCP
          volumeMounts:
          - name: uds-socket
            mountPath: /tmp/tokenizer
      volumes:
      # Shared volume for Unix Domain Socket communication between the simulator and UDS tokenizer
      - name: uds-socket
        emptyDir: {}
