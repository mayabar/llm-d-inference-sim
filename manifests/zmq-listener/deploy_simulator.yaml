apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim
  labels:
    app: sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim
  template:
    metadata:
      labels:
        app: sim
    spec:
      initContainers:
      # vLLM render sidecar - handles tokenization via HTTP (vllm launch render)
      # restartPolicy: Always makes this a native sidecar (K8s 1.29+):
      # sim will not start until this container's readinessProbe passes
      - name: vllm-render
        image: vllm/vllm-openai-cpu:v0.19.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        command: ["vllm"]
        args: ["launch", "render", "Qwen/Qwen3-0.6B", "--port=8082"]
        ports:
        - name: http
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
      containers:
        - name: sim
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          args:
            - "--port=8000"
            - "--model=Qwen/Qwen3-0.6B"
            - "--enable-sleep-mode=true"
            - "--enable-kvcache=true"
            - "--block-size=8"
            - "--zmq-endpoint=tcp://zmq-listener-service:5557"
            - "--event-batch-size=1"
            - "--render-url=http://localhost:8082"
          env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
          - name: VLLM_SERVER_DEV_MODE
            value: "1"
          ports:
          - name: sim-http
            containerPort: 8000
            protocol: TCP
