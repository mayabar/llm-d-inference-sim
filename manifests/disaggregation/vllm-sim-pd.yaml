---
# Prefill Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim-p
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/role: prefill
  template:
    metadata:
      labels:
        llm-d.ai/role: prefill
    spec:
      initContainers:
      # vLLM render sidecar - handles tokenization via HTTP (vllm launch render)
      # restartPolicy: Always makes this a native sidecar (K8s 1.29+):
      # vllm-prefill will not start until this container's readinessProbe passes
      - name: vllm-render
        image: vllm/vllm-openai-cpu:v0.19.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        command: ["vllm"]
        args: ["launch", "render", "Qwen/Qwen2.5-0.5B-Instruct", "--port=8082"]
        ports:
        - name: http
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
      containers:
        - name: vllm-prefill
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--v=4"
            - "--port=8000"
            - "--model=Qwen/Qwen2.5-0.5B-Instruct"
            - "--data-parallel-size=1"
            - "--prefill-time-per-token=200ms"
            - "--prefill-time-std-dev=3ms"
            - "--render-url=http://localhost:8082"
          ports:
            - containerPort: 8000
---
# Decode Deployment (with routing-sidecar + vLLM simulator)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim-d
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/role: decode
    spec:
      initContainers:
      # vLLM render sidecar - handles tokenization via HTTP (vllm launch render)
      # restartPolicy: Always makes this a native sidecar (K8s 1.29+):
      # vllm-decode will not start until this container's readinessProbe passes
      - name: vllm-render
        image: vllm/vllm-openai-cpu:v0.19.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        command: ["vllm"]
        args: ["launch", "render", "Qwen/Qwen2.5-0.5B-Instruct", "--port=8082"]
        ports:
        - name: http
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
      containers:
      - name: routing-sidecar
        image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.3.1-rc.1
        imagePullPolicy: IfNotPresent
        args:
          - "--v=4"
          - "--port=8000"
          - "--vllm-port=8200"
          - "--connector=nixlv2"
          - "--secure-proxy=false"
        ports:
          - containerPort: 8000
      - name: vllm-decode
        image: ghcr.io/llm-d/llm-d-inference-sim:latest
        imagePullPolicy: IfNotPresent
        args:
          - "--v=4"
          - "--port=8200"
          - "--model=Qwen/Qwen2.5-0.5B-Instruct"
          - "--data-parallel-size=1"
          - "--render-url=http://localhost:8082"
        ports:
          - containerPort: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim-p-service
spec:
  selector:
    llm-d.ai/role: prefill
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim-d-service
spec:
  selector:
    llm-d.ai/role: decode
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
