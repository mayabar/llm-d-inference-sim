# Profile 3: Small (1-3B) model on L40S, low-latency edge (constant calculator).
# Tuned for low concurrency and quick responses; KV values assume a modest network
# for cross-node P/D.
# See docs/latency-profiles.md for the full discussion.

port: 8000
model: "meta-llama/Llama-3.2-3B-Instruct"
max-num-seqs: 4
mode: "random"
latency-calculator: constant

time-to-first-token: 110ms
time-to-first-token-std-dev: 15ms
inter-token-latency: 15ms
inter-token-latency-std-dev: 2ms

kv-cache-transfer-latency: 5ms
kv-cache-transfer-latency-std-dev: 1ms

time-factor-under-load: 1.5
