apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-sim-demo
  template:
    metadata:
      labels:
        app: vllm-sim-demo
    spec:
      initContainers:
      # UDS Tokenizer sidecar - handles tokenization via gRPC over Unix Domain Socket
      - name: uds-tokenizer
        image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        env:
        - name: LOG_LEVEL
          value: "DEBUG"
        - name: PROBE_PORT
          value: "8082"
        - name: HF_TOKEN
          value: "<your HuggingFace token, if this is for a real model>"
        ports:
        - name: health
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      containers:
      - name: vllm-sim
        # Change to the next release which will use uds tokenizer
        image: ghcr.io/llm-d/llm-d-inference-sim:dev
        imagePullPolicy: IfNotPresent
        args:
        - "--model"
        - "Qwen/Qwen3.5-397B-A17B"
        - "--port"
        - "8000"
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      volumes:
      # Shared volume for Unix Domain Socket communication between EPP and UDS tokenizer
      - name: uds-socket
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim-demo-svc
  labels:
    app: vllm-sim-demo
spec:
  selector:
    app: vllm-sim-demo
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
