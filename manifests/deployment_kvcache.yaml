apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen
  template:
    metadata:
      labels:
        app: vllm-qwen
    spec:
      initContainers:
      # UDS Tokenizer sidecar - handles tokenization via gRPC over Unix Domain Socket
      # restartPolicy: Always makes this a native sidecar (K8s 1.29+):
      # vllm-sim will not start until this container's readinessProbe passes
      - name: uds-tokenizer
        image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        env:
        - name: LOG_LEVEL
          value: "DEBUG"
        - name: PROBE_PORT
          value: "8082"
        ports:
        - name: health
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      containers:
      - args:
        - --model
        - Qwen/Qwen2.5-1.5B-Instruct
        - --port
        - "8000"
        - --enable-kvcache
        - "true"
        - --v=5
        image: ghcr.io/llm-d/llm-d-inference-sim:dev
        imagePullPolicy: IfNotPresent
        name: vllm-sim
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      volumes:
      # Shared volume for Unix Domain Socket communication between the simulator and UDS tokenizer
      - name: uds-socket
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen-svc
  labels:
    app: vllm-qwen
spec:
  selector:
    app: vllm-qwen
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
